<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out</title>
  </head>
  <body>
    <form id="form" action="/sign-out" method="post">
      <button type="submit">Sign Out</button>
    </form>
    <script type="module">
      const form = document.getElementById("form");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const csrf = document.cookie
          .split("; ")
          .find((cookie) => cookie.startsWith("Trello-CSRF-Token="))
          .split("=")[1];
        const response = await fetch("/sign-out", {
          method: "POST",
          headers: { "Request-Trello-CSRF-Token": csrf },
          redirect: "follow",
        });
        window.location.href = response.url || "/public";
      });
    </script>
  </body>
</html>
